name: Workflow de Pull Request

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositório (Branch do PR)
        uses: actions/checkout@v4

      - name: Instalar Node.js (Interpretador)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm install

      - name: Executar Testes de Qualidade
        run: npm test

      - name: Executar o Projeto (Dry Run)
        run: |
          npm run seed
          node index.js & 
          sleep 5 && curl http://localhost:8080/api-docs